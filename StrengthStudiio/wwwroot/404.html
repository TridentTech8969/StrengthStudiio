<!DOCTYPE html>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Open Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 30px 20px;
        }

        .error-number {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(100px, 20vw, 200px);
            color: transparent;
            -webkit-text-stroke: 3px #ff6b00;
            line-height: 1;
            letter-spacing: -5px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .icon {
            font-size: 60px;
            margin: 10px 0;
        }

        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(24px, 5vw, 42px);
            font-weight: 700;
            margin: 20px 0 12px;
            color: #ffffff;
        }

        p {
            font-size: 16px;
            color: rgba(255,255,255,0.6);
            max-width: 480px;
            line-height: 1.7;
            margin-bottom: 40px;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            padding: 14px 32px;
            border-radius: 10px;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b00, #ffa500);
            color: #000;
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 107, 0, 0.4);
        }

        .btn-outline {
            border: 2px solid rgba(255,255,255,0.3);
            color: #ffffff;
            background: transparent;
        }
        .btn-outline:hover {
            border-color: #ff6b00;
            color: #ff6b00;
            transform: translateY(-3px);
        }

        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #ff6b00, #ffa500);
            border-radius: 2px;
            margin: 0 auto 30px;
        }

        .quick-links {
            margin-top: 50px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        .quick-links a {
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            text-decoration: none;
            border-bottom: 1px solid rgba(255,165,0,0.3);
            padding-bottom: 2px;
            transition: color 0.2s;
        }

        .quick-links a:hover { color: #ffa500; }
